<!DOCTYPE html>
<html lang="es-MX">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagar</title>
</head>
<body style="text-align:center; background-color: cornsilk;">

    <h1>Esta a un paso de sus vacaciones soñadas</h1>
    <h2>Pago</h2>

    <p>Una vez hecho el pago en las próximas 5 horas recibirá en su correo el itinerario de su viaje </p>

    <fieldset>
        <legend>Pago</legend>
        <label for="nombre">Nombre de la tarjeta</label>
        <br>
        <input type="text" id="nombre" name="nombre">
        <br><br>

        <label for="tarjeta">Numero de tarjeta</label>
        <br>
        <input type="text" id="tarjeta" name="tarjeta">
        <br><br>

        <label for="Dirección">Dirección de la tarjeta</label>
        <br>
        <input type="text" id="Dirección" name="Dirección">
        <br><br>

        <label for="vencimiento">Vencimiento</label>
        <br>
        <input type="text" id="vencimiento" name="vencimiento" placeholder="MM/AAAA">
        <br><br>

        <label for="cvv">CVV</label>
        <br>
        <input type="number" id="cvv" name="cvv">
        <br><br>
    </fieldset>
    <button type="submit">Pagar</button>
    <br><br>
    <a href="index.html">Inicio</a>

</body>
</html>
